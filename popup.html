<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      padding: 16px;
    }
    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #cba6f7;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      font-size: 13px;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.ready    { background: #a6e3a1; }
    .status-dot.loading  { background: #f9e2af; animation: pulse 1s ease-in-out infinite; }
    .status-dot.unknown  { background: #6c7086; }
    .status-dot.error    { background: #f38ba8; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .detail {
      font-size: 12px;
      color: #a6adc8;
      margin-bottom: 6px;
      line-height: 1.5;
    }
    .detail strong {
      color: #cdd6f4;
    }

    .refresh-btn {
      margin-top: 12px;
      width: 100%;
      padding: 8px;
      border: 1px solid #585b70;
      border-radius: 6px;
      background: #313244;
      color: #cdd6f4;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .refresh-btn:hover {
      background: #45475a;
    }
    .refresh-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <h1>MoxTags</h1>

  <div class="status-row">
    <span id="statusDot" class="status-dot unknown"></span>
    <span id="statusText">Checking…</span>
  </div>

  <div id="details"></div>

  <button id="refreshBtn" class="refresh-btn">Refresh tag data now</button>

  <script src="popup.js"></script>
</body>
</html>
